name: Prebook Automation

on:
  repository_dispatch:
    types: [prebook-trigger]
  workflow_dispatch:
    inputs:
      subject:
        description: 'Email subject'
        required: true
      gist_id:
        description: 'GitHub Gist ID with email body'
        required: true
      dry_run:
        description: 'Dry run?'
        default: 'false'
        type: boolean

jobs:
  create-prebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      - name: Fetch email body from Gist
        run: |
          GIST_ID="${{ github.event.client_payload.gist_id || inputs.gist_id }}"
          echo "Fetching gist: $GIST_ID"
          curl -s "https://api.github.com/gists/$GIST_ID" \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" | \
            node -e "
              const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              const file = d.files['email_body.html'] || Object.values(d.files)[0];
              require('fs').writeFileSync('/tmp/email_body.html', file.content);
              console.log('Fetched', file.content.length, 'bytes');
            "

      - name: Run automation
        run: |
          SUBJECT="${{ github.event.client_payload.subject || inputs.subject }}"
          DRY_RUN="${{ github.event.client_payload.dry_run || inputs.dry_run }}"
          if [ "$DRY_RUN" = "true" ]; then
            node index.js --subject "$SUBJECT" --html /tmp/email_body.html --dry-run
          else
            node index.js --subject "$SUBJECT" --html /tmp/email_body.html
          fi

      - name: Send results to Power Automate
        if: always()
        run: |
          SUBJECT="${{ github.event.client_payload.subject || inputs.subject }}"
          RESULTS_FILE=$(ls prebook-results-*.json 2>/dev/null | head -1)
          if [ -z "$RESULTS_FILE" ]; then
            SUMMARY="❌ Script failed before generating results."
            RESULTS="[]"
          else
            RESULTS=$(cat "$RESULTS_FILE")
            SUMMARY=$(RESULTS="$RESULTS" node -e "
              const r = JSON.parse(process.env.RESULTS);
              const lines = r.map(x => {
                if (x.error) return '❌ ' + x.location + ': ' + x.error;
                const fail = x.fail > 0 ? ', ' + x.fail + ' failed ⚠️' : '';
                return '✅ ' + x.location + ': Prebook #' + x.pbook_no + ' — ' + x.ok + ' products OK' + fail;
              });
              console.log(lines.join('<br>'));
            " 2>/dev/null || echo "Error generating summary")
          fi
          curl -s -X POST "${{ secrets.NOTIFY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"subject\": \"$SUBJECT\", \"summary\": \"$SUMMARY\", \"results\": $RESULTS}"

      - name: Delete Gist
        if: always()
        run: |
          GIST_ID="${{ github.event.client_payload.gist_id || inputs.gist_id }}"
          curl -s -X DELETE "https://api.github.com/gists/$GIST_ID" \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}"
          echo "Gist deleted"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ github.run_id }}
          path: prebook-results-*.json
          retention-days: 30
