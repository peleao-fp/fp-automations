name: Prebook Automation

on:
  repository_dispatch:
    types: [prebook-trigger]
  workflow_dispatch:
    inputs:
      subject:
        description: 'Email subject'
        required: true
      gist_id:
        description: 'GitHub Gist ID with email body'
        required: true
      run_key:
        description: 'Unique key for this run'
        required: false
        default: ''
      recipients:
        description: 'Email recipients for reminders'
        required: false
        default: ''
      dry_run:
        description: 'Dry run?'
        default: 'false'
        type: boolean

jobs:
  create-prebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      - name: Fetch email body from Gist
        run: |
          GIST_ID="${{ github.event.client_payload.gist_id || inputs.gist_id }}"
          echo "Fetching gist: $GIST_ID"
          curl -s "https://api.github.com/gists/$GIST_ID" \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -o /tmp/gist_response.json
          node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('/tmp/gist_response.json','utf8'));
            if (!d.files) { console.error('Gist error:', JSON.stringify(d).substring(0,200)); process.exit(1); }
            const content = Object.values(d.files)[0].content || '';
            fs.writeFileSync('/tmp/email_body.html', content);
            console.log('OK -', content.length, 'bytes');
          "

      - name: Run automation
        run: |
          SUBJECT="${{ github.event.client_payload.subject || inputs.subject }}"
          DRY_RUN="${{ github.event.client_payload.dry_run || inputs.dry_run }}"
          if [ "$DRY_RUN" = "true" ]; then
            node index.js --subject "$SUBJECT" --html /tmp/email_body.html --dry-run
          else
            node index.js --subject "$SUBJECT" --html /tmp/email_body.html
          fi

      - name: Save results to Gist
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RESULTS_GIST_ID: ${{ secrets.RESULTS_GIST_ID }}
          SUBJECT: ${{ github.event.client_payload.subject || inputs.subject }}
          RUN_KEY: ${{ github.event.client_payload.run_key || inputs.run_key || github.run_id }}
        run: |
          node -e "
            const fs    = require('fs');
            const https = require('https');

            const subject  = process.env.SUBJECT  || '';
            const gistId   = process.env.RESULTS_GIST_ID;
            const token    = process.env.GH_TOKEN;
            const runKey   = process.env.RUN_KEY  || 'default';
            const fileName = 'results_' + runKey + '.json';

            const files = fs.readdirSync('.').filter(f => f.startsWith('prebook-results-') && f.endsWith('.json'));
            let results = [];
            if (files.length > 0) {
              try { results = JSON.parse(fs.readFileSync(files[0], 'utf8')); } catch(e) {}
            }

            const mapped = results.map(x => ({
              location:     x.location     || '?',
              type:         x.type         || '',
              success:      x.success      || false,
              pbook_no:     x.pbook_no     || '?',
              prebook_uq:   x.prebook_uq   || '?',
              ok:           x.ok           || 0,
              fail:         x.fail         || 0,
              error:        x.error        || null,
              failed_items: x.failed_items || [],
            }));

            const summary_html = mapped.length === 0
              ? '<p>No prebooks created.</p>'
              : mapped.map(x => {
                  const label = x.location + (x.type ? ' ' + x.type : '');
                  if (!x.success) return '<p>❌ FAILED ' + label + ': ' + (x.error||'Error') + '</p>';
                  let html = '<p>✅ ' + label + ': Prebook #<b>' + x.pbook_no + '</b> — ' + x.ok + ' products OK';
                  if (x.fail > 0) {
                    html += ' ⚠️ ' + x.fail + ' failed';
                    if (x.failed_items && x.failed_items.length > 0) {
                      html += '<br><small style=\"color:#cc0000\">';
                      html += x.failed_items.map(f => '• ' + f.product + ': ' + f.reason).join('<br>');
                      html += '</small>';
                    }
                  }
                  html += '</p>';
                  return html;
                }).join('');

            const content = JSON.stringify({ subject, timestamp: new Date().toISOString(), summary_html, results: mapped }, null, 2);
            const body    = JSON.stringify({ files: { [fileName]: { content } } });

            const req = https.request({
              hostname: 'api.github.com',
              path: '/gists/' + gistId,
              method: 'PATCH',
              headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json',
                'User-Agent': 'fp-automations',
                'Accept': 'application/vnd.github.v3+json',
                'Content-Length': Buffer.byteLength(body),
              }
            }, res => {
              let data = '';
              res.on('data', c => data += c);
              res.on('end', () => {
                if (res.statusCode === 200) console.log('Saved:', fileName);
                else console.error('Failed:', res.statusCode, data.substring(0,200));
              });
            });
            req.on('error', e => console.error('Error:', e.message));
            req.write(body);
            req.end();
          "

      - name: Update prebook tracking
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RESULTS_GIST_ID: ${{ secrets.RESULTS_GIST_ID }}
          SUBJECT: ${{ github.event.client_payload.subject || inputs.subject }}
          RECIPIENTS: ${{ github.event.client_payload.recipients || inputs.recipients }}
        run: |
          node --input-type=commonjs -e "
            const fs    = require('fs');
            const https = require('https');

            const gistId    = process.env.RESULTS_GIST_ID;
            const token     = process.env.GH_TOKEN;
            const subject   = process.env.SUBJECT   || '';
            const recipients = process.env.RECIPIENTS || '';

            // Read newly created prebooks from results file
            const resFiles = fs.readdirSync('.').filter(f => f.startsWith('prebook-results-') && f.endsWith('.json'));
            let newPrebooks = [];
            if (resFiles.length > 0) {
              try {
                const results = JSON.parse(fs.readFileSync(resFiles[0], 'utf8'));
                newPrebooks = results
                  .filter(x => x.success && x.prebook_uq)
                  .map(x => ({
                    prebook_uq:  x.prebook_uq,
                    pbook_no:    x.pbook_no,
                    location:    x.location,
                    type:        x.type,
                    subject,
                    recipients,
                    created_at:  new Date().toISOString(),
                  }));
              } catch(e) { console.warn('Could not read results:', e.message); }
            }

            if (newPrebooks.length === 0) { console.log('No prebooks to track'); process.exit(0); }

            // Read existing tracking list from Gist
            function fetchGist() {
              return new Promise((resolve, reject) => {
                const req = https.request({
                  hostname: 'api.github.com',
                  path: '/gists/' + gistId,
                  method: 'GET',
                  headers: { 'Authorization': 'Bearer ' + token, 'User-Agent': 'fp-automations', 'Accept': 'application/vnd.github.v3+json' }
                }, res => {
                  let d = ''; res.on('data', c => d += c);
                  res.on('end', () => { try { resolve(JSON.parse(d)); } catch(e) { reject(e); } });
                });
                req.on('error', reject); req.end();
              });
            }

            function updateGist(content) {
              return new Promise((resolve, reject) => {
                const body = JSON.stringify({ files: { 'open_prebooks.json': { content } } });
                const req = https.request({
                  hostname: 'api.github.com',
                  path: '/gists/' + gistId,
                  method: 'PATCH',
                  headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'User-Agent': 'fp-automations', 'Accept': 'application/vnd.github.v3+json', 'Content-Length': Buffer.byteLength(body) }
                }, res => {
                  let d = ''; res.on('data', c => d += c);
                  res.on('end', () => resolve(res.statusCode));
                });
                req.on('error', reject); req.write(body); req.end();
              });
            }

            (async () => {
              const gist = await fetchGist();
              let existing = [];
              try {
                const f = gist.files?.['open_prebooks.json'];
                if (f?.content) existing = JSON.parse(f.content);
              } catch(e) {}

              const updated = [...existing, ...newPrebooks];
              const status  = await updateGist(JSON.stringify(updated, null, 2));
              console.log('Tracking updated:', status, '— now tracking', updated.length, 'prebooks');
            })().catch(e => { console.error('Tracking error:', e.message); process.exit(1); });
          "

      - name: Delete email Gist
        if: always()
        run: |
          GIST_ID="${{ github.event.client_payload.gist_id || inputs.gist_id }}"
          if [ -n "$GIST_ID" ]; then
            curl -s -X DELETE "https://api.github.com/gists/$GIST_ID" \
              -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}"
            echo "Email gist deleted"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ github.run_id }}
          path: prebook-results-*.json
          retention-days: 30
