name: Prebook Automation

on:
  repository_dispatch:
    types: [prebook-trigger]
  workflow_dispatch:
    inputs:
      subject:
        description: 'Email subject'
        required: true
      gist_id:
        description: 'GitHub Gist ID with email body'
        required: true
      dry_run:
        description: 'Dry run?'
        default: 'false'
        type: boolean

jobs:
  create-prebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      - name: Fetch email body from Gist
        run: |
          GIST_ID="${{ github.event.client_payload.gist_id || inputs.gist_id }}"
          echo "Fetching gist: $GIST_ID"
          curl -s "https://api.github.com/gists/$GIST_ID" \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -o /tmp/gist_response.json
          node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('/tmp/gist_response.json','utf8'));
            if (!d.files) { console.error('Gist error:', JSON.stringify(d).substring(0,200)); process.exit(1); }
            const files = Object.values(d.files);
            const content = files[0].content || '';
            fs.writeFileSync('/tmp/email_body.html', content);
            console.log('OK -', content.length, 'bytes');
          "

      - name: Run automation
        run: |
          SUBJECT="${{ github.event.client_payload.subject || inputs.subject }}"
          DRY_RUN="${{ github.event.client_payload.dry_run || inputs.dry_run }}"
          if [ "$DRY_RUN" = "true" ]; then
            node index.js --subject "$SUBJECT" --html /tmp/email_body.html --dry-run
          else
            node index.js --subject "$SUBJECT" --html /tmp/email_body.html
          fi

      - name: Save results to fixed Gist
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RESULTS_GIST_ID: ${{ secrets.RESULTS_GIST_ID }}
          SUBJECT: ${{ github.event.client_payload.subject || inputs.subject }}
        run: |
          node -e "
            const fs   = require('fs');
            const https = require('https');

            const subject = process.env.SUBJECT || '';
            const gistId  = process.env.RESULTS_GIST_ID;
            const token   = process.env.GH_TOKEN;

            // Read results file
            const files = fs.readdirSync('.').filter(f => f.startsWith('prebook-results-') && f.endsWith('.json'));
            let results = [];
            if (files.length > 0) {
              try { results = JSON.parse(fs.readFileSync(files[0], 'utf8')); } catch(e) {}
            }

            const content = JSON.stringify({
              subject,
              timestamp: new Date().toISOString(),
              status: results.length > 0 && results.every(x => x.success) ? 'success' : results.length === 0 ? 'failed' : 'partial',
              results: results.map(x => ({
                location:   x.location   || '?',
                success:    x.success    || false,
                pbook_no:   x.pbook_no   || '?',
                prebook_uq: x.prebook_uq || '?',
                ok:         x.ok         || 0,
                fail:       x.fail       || 0,
                error:      x.error      || null,
              }))
            }, null, 2);

            const body = JSON.stringify({ files: { 'results.json': { content } } });

            const req = https.request({
              hostname: 'api.github.com',
              path: '/gists/' + gistId,
              method: 'PATCH',
              headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json',
                'User-Agent': 'fp-automations',
                'Accept': 'application/vnd.github.v3+json',
                'Content-Length': Buffer.byteLength(body),
              }
            }, res => {
              let data = '';
              res.on('data', c => data += c);
              res.on('end', () => {
                if (res.statusCode === 200) console.log('Results saved to Gist!');
                else console.error('Gist update failed:', res.statusCode, data.substring(0, 200));
              });
            });
            req.on('error', e => console.error('Error:', e.message));
            req.write(body);
            req.end();
          "

      - name: Delete email Gist
        if: always()
        run: |
          GIST_ID="${{ github.event.client_payload.gist_id || inputs.gist_id }}"
          if [ -n "$GIST_ID" ]; then
            curl -s -X DELETE "https://api.github.com/gists/$GIST_ID" \
              -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}"
            echo "Email gist deleted"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ github.run_id }}
          path: prebook-results-*.json
          retention-days: 30
